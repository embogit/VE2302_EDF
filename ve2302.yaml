machine:
    post:
        QEMU_HW_DTB_PS:
            comment: "Decivetree sources can be found from https://github.com/Xilinx/qemu-devicetrees/"
            op: '='
            val: "${QEMU_HW_DTB_PATH}/board-versal-xcve2302-ps-virt.dtb"
        QEMU_HW_DTB_PMC:
            op: '='
            val: "${QEMU_HW_DTB_PATH}/board-versal-xcve2302-pmc-virt.dtb"
        QEMU_HW_BOOT_MODE:
            op: '='
            val: "3"
